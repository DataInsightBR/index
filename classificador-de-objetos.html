<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Classificador de Imagens</title>

  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap');

    :root {
      --bg:      #0d0f14;
      --surface: #161920;
      --border:  #2a2e3a;
      --accent:  #6ee7b7;
      --accent2: #38bdf8;
      --text:    #e8eaf0;
      --muted:   #6b7280;
      --radius:  14px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 16px 80px;
    }

    header { text-align: center; margin-bottom: 48px; }
    header .label {
      font-size: 11px;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 12px;
    }
    header h1 {
      font-family: 'Syne', sans-serif;
      font-size: clamp(2rem, 5vw, 3.5rem);
      font-weight: 800;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    header p {
      margin-top: 12px;
      color: var(--muted);
      font-size: 15px;
      max-width: 460px;
      margin-inline: auto;
      line-height: 1.6;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      width: 100%;
      max-width: 560px;
      padding: 32px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    /* Input FORA da drop-zone para evitar conflito de eventos */
    #fileInput { display: none; }

    .drop-zone {
      border: 2px dashed var(--border);
      border-radius: var(--radius);
      min-height: 220px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      cursor: pointer;
      transition: border-color .2s, background .2s;
      position: relative;
      overflow: hidden;
      user-select: none;
    }
    .drop-zone:hover,
    .drop-zone.drag-over {
      border-color: var(--accent);
      background: rgba(110,231,183,.04);
    }
    .drop-zone .icon { color: var(--muted); transition: color .2s; pointer-events: none; }
    .drop-zone:hover .icon { color: var(--accent); }
    .drop-zone .hint { font-size: 13px; color: var(--muted); pointer-events: none; }

    #preview {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: var(--bg);
      display: none;
    }

    #changeBtn {
      position: absolute;
      top: 10px;
      right: 10px;
      background: rgba(0,0,0,.65);
      color: var(--accent);
      border: 1px solid var(--accent);
      border-radius: 8px;
      padding: 4px 10px;
      font-size: 12px;
      cursor: pointer;
      display: none;
      z-index: 10;
    }

    button#classifyBtn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: var(--radius);
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #0d0f14;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 15px;
      cursor: pointer;
      letter-spacing: .5px;
      transition: opacity .2s, transform .1s;
    }
    button#classifyBtn:hover:not(:disabled) { opacity: .88; }
    button#classifyBtn:active:not(:disabled) { transform: scale(.98); }
    button#classifyBtn:disabled { opacity: .4; cursor: not-allowed; }

    #status { font-size: 13px; color: var(--muted); text-align: center; min-height: 20px; }

    #results { display: flex; flex-direction: column; gap: 10px; }
    .result-item { display: flex; flex-direction: column; gap: 4px; }
    .result-header { display: flex; justify-content: space-between; font-size: 13px; }
    .class-name { color: var(--text); font-weight: 500; }
    .class-pct  { color: var(--accent); font-weight: 700; }
    .bar-bg { height: 6px; background: var(--border); border-radius: 99px; overflow: hidden; }
    .bar-fill {
      height: 100%;
      border-radius: 99px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      width: 0%;
      transition: width .5s ease;
    }

    #topResult {
      text-align: center;
      font-family: 'Syne', sans-serif;
      font-size: 1.4rem;
      font-weight: 800;
      padding: 16px;
      border-radius: var(--radius);
      border: 1px solid var(--accent);
      background: rgba(110,231,183,.06);
      display: none;
    }
    #topResult span { color: var(--accent); }

    footer { margin-top: 40px; font-size: 12px; color: var(--muted); text-align: center; }
    footer a { color: var(--accent); text-decoration: none; }
  </style>
</head>
<body>

<!-- ✏️ Input file colocado diretamente no body, fora de qualquer container -->
<input type="file" id="fileInput" accept="image/*" />

<header>
  <!-- ✏️ Personalize o título e descrição -->
  <p class="label">Teachable Machine · IA</p>
  <h1>Classificador de Imagens</h1>
  <p>Envie uma imagem e o modelo de inteligência artificial irá identificá-la.</p>
</header>

<div class="card">

  <div class="drop-zone" id="dropZone">
    <svg class="icon" width="40" height="40" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round"
        d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5m-13.5-9L12 3m0 0l4.5 4.5M12 3v13.5"/>
    </svg>
    <span class="hint">Clique ou arraste uma imagem aqui</span>
    <img id="preview" alt="Preview" />
    <button id="changeBtn">✕ Trocar imagem</button>
  </div>

  <p id="status">Carregando modelo…</p>

  <button id="classifyBtn" disabled>Identificar</button>

  <div id="topResult">Resultado: <span id="topLabel"></span></div>

  <div id="results"></div>

</div>

<footer>
  Powered by
  <a href="https://teachablemachine.withgoogle.com/" target="_blank">Teachable Machine</a>
  &amp;
  <a href="https://www.tensorflow.org/js" target="_blank">TensorFlow.js</a>
</footer>

<script>
  /* ════════════════════════════════════════════════════════════
     ✏️  ÚNICA COISA QUE VOCÊ PRECISA ALTERAR:
     Cole aqui a URL do seu modelo exportado no Teachable Machine.
     (Vá em Export Model → TensorFlow.js → Upload my model)
  ════════════════════════════════════════════════════════════ */
  var MODEL_URL = "https://teachablemachine.withgoogle.com/models/V68zV0L3v/";


  /* ── Referências DOM ── */
  var fileInput   = document.getElementById("fileInput");
  var dropZone    = document.getElementById("dropZone");
  var preview     = document.getElementById("preview");
  var changeBtn   = document.getElementById("changeBtn");
  var statusEl    = document.getElementById("status");
  var classifyBtn = document.getElementById("classifyBtn");
  var resultsDiv  = document.getElementById("results");
  var topResult   = document.getElementById("topResult");
  var topLabel    = document.getElementById("topLabel");

  var model = null;
  var imageLoaded = false;

  /* ── Carrega o modelo ── */
  tmImage.load(MODEL_URL + "model.json", MODEL_URL + "metadata.json")
    .then(function (m) {
      model = m;
      statusEl.textContent = "Modelo pronto! Envie uma imagem.";
    })
    .catch(function (e) {
      statusEl.textContent = "⚠️ Erro ao carregar modelo. Verifique a URL.";
      console.error(e);
    });

  /* ── Clique na drop-zone ── */
  dropZone.addEventListener("click", function (e) {
    if (e.target === changeBtn) return; // changeBtn tem listener próprio
    fileInput.click();
  });

  /* ── Botão trocar ── */
  changeBtn.addEventListener("click", function (e) {
    e.stopPropagation();
    fileInput.value = ""; // reseta para permitir mesmo arquivo
    fileInput.click();
  });

  /* ── Seleção via input ── */
  fileInput.addEventListener("change", function () {
    if (this.files && this.files.length > 0) {
      showImage(this.files[0]);
    }
  });

  /* ── Drag & Drop ── */
  dropZone.addEventListener("dragover", function (e) {
    e.preventDefault();
    dropZone.classList.add("drag-over");
  });
  dropZone.addEventListener("dragleave", function () {
    dropZone.classList.remove("drag-over");
  });
  dropZone.addEventListener("drop", function (e) {
    e.preventDefault();
    dropZone.classList.remove("drag-over");
    var file = e.dataTransfer.files[0];
    if (file && file.type.startsWith("image/")) showImage(file);
  });

  /* ── Exibe a imagem no preview ── */
  function showImage(file) {
    var reader = new FileReader();
    reader.onload = function (e) {
      preview.onload = function () {
        // Garante que o elemento está visível e dimensionado antes de classificar
        imageLoaded = true;
        classifyBtn.disabled = !model;
        statusEl.textContent = model ? "Pronto para identificar!" : "Aguardando modelo…";
      };
      preview.src = e.target.result;
      preview.style.display = "block";
      changeBtn.style.display = "block";
      resultsDiv.innerHTML = "";
      topResult.style.display = "none";
    };
    reader.readAsDataURL(file);
  }

  /* ── Classifica ── */
  classifyBtn.addEventListener("click", function () {
    if (!model || !imageLoaded) return;

    classifyBtn.disabled = true;
    statusEl.textContent = "Analisando…";
    resultsDiv.innerHTML = "";
    topResult.style.display = "none";

    model.predict(preview)
      .then(function (predictions) {
        predictions.sort(function (a, b) { return b.probability - a.probability; });

        topLabel.textContent = predictions[0].className;
        topResult.style.display = "block";

        predictions.forEach(function (p) {
          var pct = (p.probability * 100).toFixed(1);
          var item = document.createElement("div");
          item.className = "result-item";
          item.innerHTML =
            '<div class="result-header">' +
              '<span class="class-name">' + p.className + '</span>' +
              '<span class="class-pct">' + pct + '%</span>' +
            '</div>' +
            '<div class="bar-bg"><div class="bar-fill" id="bar-' + p.className.replace(/\s/g,'') + '"></div></div>';
          resultsDiv.appendChild(item);

          setTimeout(function () {
            item.querySelector(".bar-fill").style.width = pct + "%";
          }, 50);
        });

        statusEl.textContent = "Identificação concluída!";
        classifyBtn.disabled = false;
      })
      .catch(function (err) {
        statusEl.textContent = "⚠️ Erro ao classificar. Tente outra imagem.";
        console.error(err);
        classifyBtn.disabled = false;
      });
  });
</script>
</body>
</html>
