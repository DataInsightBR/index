<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Classificador de Imagens</title>

<!--
Código baseado em:
https://lucasrtorquato.github.io/modelo_teachablemachine/
Autor: Professor Lucas Torquato
-->
  
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap');

:root {
  --bg: #f8f9fa;
  --surface: #ffffff;
  --border: #e5e7eb;

  --accent: #1a73e8;
  --accent2: #34a853;

  --text: #202124;
  --muted: #5f6368;

  --radius: 12px;
}

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  background: var(--bg);
  font-family: 'Roboto', sans-serif;
  color: var(--text);
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 40px 16px;
}

/* HEADER */
header {
  text-align: center;
  margin-bottom: 40px;
}

header .label {
  font-size: 12px;
  color: var(--muted);
  margin-bottom: 8px;
}

header h1 {
  font-size: 2rem;
  font-weight: 500;
}

/* CARD */
.card {
  width: 100%;
  max-width: 520px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 24px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.06);
  display: flex;
  flex-direction: column;
  gap: 20px;
}

/* DROP ZONE */
.drop-zone {
  border: 2px dashed #dadce0;
  background: #fafafa;
  border-radius: var(--radius);
  height: 200px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  position: relative;
  overflow: hidden;
  transition: 0.2s;
}

.drop-zone:hover {
  border-color: var(--accent);
  background: #f1f3f4;
}

.drop-zone span {
  color: var(--muted);
  font-size: 14px;
}

#preview {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: none;
}

/* BOTÃO */
button {
  padding: 12px;
  border: none;
  border-radius: var(--radius);
  background: var(--accent);
  color: white;
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  box-shadow: 0 2px 6px rgba(26,115,232,.3);
  transition: 0.2s;
}

button:hover:not(:disabled) {
  background: #1669c1;
}

button:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}

/* STATUS */
#status {
  font-size: 13px;
  color: var(--muted);
  text-align: center;
}

/* RESULTADO PRINCIPAL */
#topResult {
  display: none;
  text-align: center;
  padding: 14px;
  border-radius: var(--radius);
  background: #e8f0fe;
  border: 1px solid #d2e3fc;
  color: #1a73e8;
  font-weight: 500;
}

/* RESULTADOS */
.result-item {
  margin-top: 10px;
}

.bar-bg {
  height: 6px;
  background: #e5e7eb;
  border-radius: 999px;
  overflow: hidden;
}

.bar-fill {
  height: 100%;
  width: 0%;
  background: var(--accent);
  transition: width .5s ease;
}

footer {
  margin-top: 30px;
  font-size: 12px;
  color: var(--muted);
}
</style>
</head>

<body>

<input type="file" id="fileInput" accept="image/*" hidden>

<header>
  <p class="label">Google Style · IA</p>
  <h1>Classificador de Imagens</h1>
</header>

<div class="card">

  <div class="drop-zone" id="dropZone">
    <span>Clique ou arraste uma imagem</span>
    <img id="preview">
  </div>

  <p id="status">Carregando modelo...</p>

  <button id="classifyBtn" disabled>Identificar imagem</button>

  <div id="topResult">Resultado: <span id="topLabel"></span></div>

  <div id="results"></div>

</div>

<footer>
  Powered by Teachable Machine & TensorFlow.js
 
  Interface adaptada a partir de:
  <a href="https://lucasrtorquato.github.io/modelo_teachablemachine/" target="_blank">
    modelo_teachablemachine
  </a>
  por Professor Lucas Torquato
</footer>


<script>
var MODEL_URL = "https://teachablemachine.withgoogle.com/models/V68zV0L3v/";

var fileInput = document.getElementById("fileInput");
var dropZone = document.getElementById("dropZone");
var preview = document.getElementById("preview");
var statusEl = document.getElementById("status");
var classifyBtn = document.getElementById("classifyBtn");
var resultsDiv = document.getElementById("results");
var topResult = document.getElementById("topResult");
var topLabel = document.getElementById("topLabel");

var model, imageLoaded = false;

/* carregar modelo */
tmImage.load(MODEL_URL + "model.json", MODEL_URL + "metadata.json")
.then(m => {
  model = m;
  statusEl.textContent = "Modelo pronto. Envie uma imagem.";
})
.catch(() => {
  statusEl.textContent = "Erro ao carregar modelo.";
});

/* upload */
dropZone.onclick = () => fileInput.click();

fileInput.onchange = e => {
  const file = e.target.files[0];
  if(file) showImage(file);
};

function showImage(file){
  const reader = new FileReader();
  reader.onload = e => {
    preview.src = e.target.result;
    preview.style.display = "block";
    imageLoaded = true;
    classifyBtn.disabled = false;
  };
  reader.readAsDataURL(file);
}

/* classificar */
classifyBtn.onclick = async () => {
  if(!model || !imageLoaded) return;

  statusEl.textContent = "Analisando...";
  resultsDiv.innerHTML = "";
  topResult.style.display = "none";

  const predictions = await model.predict(preview);
  predictions.sort((a,b)=>b.probability-a.probability);

  topLabel.textContent = predictions[0].className;
  topResult.style.display = "block";

  predictions.forEach(p=>{
    const pct = (p.probability*100).toFixed(1);

    const div = document.createElement("div");
    div.className = "result-item";
    div.innerHTML = `
      <div style="font-size:13px; margin-bottom:4px;">
        ${p.className} - ${pct}%
      </div>
      <div class="bar-bg">
        <div class="bar-fill"></div>
      </div>
    `;
    resultsDiv.appendChild(div);

    setTimeout(()=>{
      div.querySelector(".bar-fill").style.width = pct + "%";
    },50);
  });

  statusEl.textContent = "Pronto!";
};
</script>

</body>
</html>
